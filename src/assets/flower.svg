<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Sacred hibiscus/pushpam flower — 5 petals with gold gradient -->
  <defs>
    <radialGradient id="petalGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F4C2C2"/>
      <stop offset="50%" stop-color="#E88D8D"/>
      <stop offset="100%" stop-color="#C4606A"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0D68A"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" transform="translate(60,60)">
    <!-- 5 petals rotated 72° apart -->
    <g fill="url(#petalGrad)" opacity="0.9">
      <ellipse cx="0" cy="-28" rx="18" ry="28" transform="rotate(0)"/>
      <ellipse cx="0" cy="-28" rx="18" ry="28" transform="rotate(72)"/>
      <ellipse cx="0" cy="-28" rx="18" ry="28" transform="rotate(144)"/>
      <ellipse cx="0" cy="-28" rx="18" ry="28" transform="rotate(216)"/>
      <ellipse cx="0" cy="-28" rx="18" ry="28" transform="rotate(288)"/>
    </g>
    <!-- Inner petals — smaller, slightly rotated -->
    <g fill="url(#petalGrad)" opacity="0.6">
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(36)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(108)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(180)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(252)"/>
      <ellipse cx="0" cy="-18" rx="10" ry="18" transform="rotate(324)"/>
    </g>
    <!-- Center -->
    <circle cx="0" cy="0" r="8" fill="url(#centerGrad)"/>
    <circle cx="0" cy="0" r="4" fill="#E8801A" opacity="0.6"/>
  </g>
</svg>
