<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90">
  <defs>
    <linearGradient id="lo" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F4C2C2"/>
      <stop offset="100%" stop-color="#C48080"/>
    </linearGradient>
    <linearGradient id="lm" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFD6E0"/>
      <stop offset="100%" stop-color="#E8A0A8"/>
    </linearGradient>
    <linearGradient id="li" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F0"/>
      <stop offset="100%" stop-color="#F4C8C8"/>
    </linearGradient>
    <linearGradient id="lc" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F0D68A"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>
  <g transform="translate(60,68)">
    <!-- Outer petals — wide spread -->
    <path d="M0,-55 C8,-48 14,-30 12,-10 C10,2 4,6 0,6 C-4,6 -10,2 -12,-10 C-14,-30 -8,-48 0,-55Z" fill="url(#lo)" opacity="0.6" transform="rotate(-40)"/>
    <path d="M0,-55 C8,-48 14,-30 12,-10 C10,2 4,6 0,6 C-4,6 -10,2 -12,-10 C-14,-30 -8,-48 0,-55Z" fill="url(#lo)" opacity="0.6" transform="rotate(40)"/>
    <!-- Mid petals -->
    <path d="M0,-52 C7,-44 12,-28 10,-10 C8,0 3,4 0,4 C-3,4 -8,0 -10,-10 C-12,-28 -7,-44 0,-52Z" fill="url(#lm)" opacity="0.75" transform="rotate(-22)"/>
    <path d="M0,-52 C7,-44 12,-28 10,-10 C8,0 3,4 0,4 C-3,4 -8,0 -10,-10 C-12,-28 -7,-44 0,-52Z" fill="url(#lm)" opacity="0.75" transform="rotate(22)"/>
    <path d="M0,-52 C7,-44 12,-28 10,-10 C8,0 3,4 0,4 C-3,4 -8,0 -10,-10 C-12,-28 -7,-44 0,-52Z" fill="url(#lm)" opacity="0.75" transform="rotate(0)"/>
    <!-- Inner petals — upright -->
    <path d="M0,-46 C5,-40 9,-26 8,-10 C6,0 2,3 0,3 C-2,3 -6,0 -8,-10 C-9,-26 -5,-40 0,-46Z" fill="url(#li)" opacity="0.9" transform="rotate(-10)"/>
    <path d="M0,-46 C5,-40 9,-26 8,-10 C6,0 2,3 0,3 C-2,3 -6,0 -8,-10 C-9,-26 -5,-40 0,-46Z" fill="url(#li)" opacity="0.9" transform="rotate(10)"/>
    <!-- Center stamen -->
    <circle cx="0" cy="-6" r="5" fill="url(#lc)" opacity="0.7"/>
    <circle cx="0" cy="-6" r="2" fill="#E8801A" opacity="0.5"/>
    <!-- Leaf base -->
    <ellipse cx="0" cy="6" rx="30" ry="6" fill="#3A6B3A" opacity="0.2"/>
  </g>
</svg>
