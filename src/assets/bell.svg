<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D68A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#A67C2E"/>
    </linearGradient>
    <linearGradient id="bh" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E8C860"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <!-- Handle ring -->
  <circle cx="40" cy="10" r="7" stroke="url(#bh)" stroke-width="2.5" fill="none"/>
  <!-- Handle stem -->
  <rect x="37.5" y="16" width="5" height="8" rx="1.5" fill="url(#bh)"/>
  <!-- Bell body -->
  <path d="M20,26 C20,24 24,22 40,22 C56,22 60,24 60,26 L62,72 C62,80 52,86 40,86 C28,86 18,80 18,72 Z" fill="url(#bg)"/>
  <!-- Highlight -->
  <path d="M28,28 C28,26 34,24 40,24 C42,24 44,24 46,25 L47,65 C47,68 44,70 40,70 C36,70 33,68 33,65 Z" fill="white" opacity="0.08"/>
  <!-- Rim -->
  <ellipse cx="40" cy="86" rx="24" ry="5" fill="#8B6914"/>
  <ellipse cx="40" cy="85" rx="22" ry="3.5" fill="url(#bg)" opacity="0.7"/>
  <!-- Clapper -->
  <line x1="40" y1="60" x2="40" y2="80" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <circle cx="40" cy="82" r="4" fill="#A67C2E"/>
  <!-- Decorative bands -->
  <rect x="24" y="46" width="32" height="1.5" rx="0.75" fill="#FFE8A0" opacity="0.25"/>
  <rect x="22" y="56" width="36" height="1" rx="0.5" fill="#FFE8A0" opacity="0.15"/>
</svg>
