<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Temple bell — gold with sacred ring -->
  <defs>
    <linearGradient id="bellGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F0D68A"/>
      <stop offset="40%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#A67C2E"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="bellGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#bellGlow)">
    <!-- Handle / chain ring -->
    <circle cx="50" cy="14" r="8" stroke="url(#handleGrad)" stroke-width="3" fill="none"/>
    <!-- Handle connector -->
    <rect x="47" y="20" width="6" height="10" rx="2" fill="url(#handleGrad)"/>
    <!-- Bell body -->
    <path d="M26,30 Q26,30 28,32 L28,80 Q28,92 50,96 Q72,92 72,80 L72,32 Q74,30 74,30 Z"
      fill="url(#bellGrad)" stroke="#C4960C" stroke-width="0.5"/>
    <!-- Bell dome curve -->
    <path d="M28,32 Q50,20 72,32" fill="url(#bellGrad)" stroke="#C4960C" stroke-width="0.5"/>
    <!-- Bell lip / rim -->
    <ellipse cx="50" cy="96" rx="26" ry="6" fill="#A67C2E" opacity="0.8"/>
    <ellipse cx="50" cy="94" rx="24" ry="4" fill="url(#bellGrad)" opacity="0.5"/>
    <!-- Clapper -->
    <line x1="50" y1="70" x2="50" y2="90" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="92" r="4" fill="#8B6914"/>
    <!-- Decorative band -->
    <rect x="30" y="55" width="40" height="2" rx="1" fill="#C4960C" opacity="0.4"/>
    <rect x="32" y="62" width="36" height="1.5" rx="1" fill="#C4960C" opacity="0.3"/>
  </g>
</svg>
